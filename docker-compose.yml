services:
  go2rtc:
    image: alexxit/go2rtc:latest
    container_name: sense_go2rtc
    
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    container_name: sense_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    container_name: sense_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SECRET_KEY=${JWT_SECRET_KEY}
    depends_on:
      - db
      - go2rtc
    restart: unless-stopped
    volumes:
      - ./static:/app/static

  frontend:
    build: ./frontend
    container_name: sense_frontend
    ports:
      - "80:80" 
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data: