services:
  go2rtc:
    image: alexxit/go2rtc:latest
    container_name: sense_go2rtc
    restart: unless-stopped
    extra_hosts:                           
      - "host.docker.internal:host-gateway"
    environment:
      - TZ=America/Sao_Paulo
      
  db:
    image: postgres:15-alpine
    container_name: sense_db
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - TZ=America/Sao_Paulo
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    container_name: sense_backend
    ports:
      - "8000:8000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - DATABASE_URL=sqlite:///./static/sensevision.db 
      - SECRET_KEY=${JWT_SECRET_KEY}
      - REGISTRATION_INVITE_CODE=${REGISTRATION_INVITE_CODE}
      - TZ=America/Sao_Paulo
      - OMP_NUM_THREADS=4
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    extra_hosts:                               
      - "host.docker.internal:host-gateway"     
    depends_on:
      - go2rtc
    restart: unless-stopped
    volumes:
      - ./static:/app/static

  frontend:
    build: ./frontend
    container_name: sense_frontend
    ports:
      - "80:80" 
    depends_on:
      - backend
    restart: unless-stopped
    environment:
      - TZ=America/Sao_Paulo

volumes:
  postgres_data: