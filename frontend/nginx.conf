server {
    listen 80;
    client_max_body_size 500M;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    
    location /api/ {
        proxy_pass http://sense_backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /live/ {
        proxy_pass http://sense_go2rtc:1984/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    
    location /static/ {
        proxy_pass http://sense_backend:8000/static/;
    }
}